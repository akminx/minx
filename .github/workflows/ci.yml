name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff
        run: uv run ruff check minx_mcp tests scripts
      - name: Mypy
        run: uv run mypy minx_mcp
      - name: Tests
        run: uv run pytest tests/ -q
